<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlphaBot Trading</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg0:#0d0f14;--bg1:#13161e;--bg2:#1a1e28;--bg3:#222736;
--border:#2a2f3d;--border2:#3a4055;
--t1:#e8eaf0;--t2:#8b91a8;--t3:#555d78;
--green:#00d68f;--red:#ff4d6a;--blue:#4d9fff;--amber:#ffb347;--purple:#9b59ff;
--gdim:rgba(0,214,143,0.13);--rdim:rgba(255,77,106,0.13);--bdim:rgba(77,159,255,0.1);
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg0);color:var(--t1);font-size:13px;overflow-x:hidden}
.hidden{display:none!important}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--t1);font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm{padding:4px 9px;font-size:11px}
input,select,textarea{font-family:inherit;font-size:12px;color:var(--t1);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;width:100%}
.nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg1);overflow-x:auto}
.nav-tab{padding:9px 13px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);background:none;border:none;white-space:nowrap;display:flex;align-items:center;gap:4px}
.nav-tab.active{color:var(--t1);border-bottom-color:var(--blue)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg1);border-bottom:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.pup{color:var(--green)}.pdn{color:var(--red)}
.wrap{position:relative;background:var(--bg0)}
.page{padding:12px}
.overlay{position:fixed;inset:0;background:var(--bg0);z-index:300;display:flex;flex-direction:column}
.overlay-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--border)}
.overlay-body{flex:1;padding:14px;overflow-y:auto}
</style>
</head>
<body>

<div class="wrap" id="app">
    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div class="card" style="margin:2rem auto;max-width:320px;padding:1.25rem">
            <h2 style="text-align:center;margin-bottom:1rem">AlphaBot Trading</h2>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email" style="margin-bottom:8px">
                <input type="password" id="login-pass" placeholder="Password" style="margin-bottom:12px">
                <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Sign in</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-app" class="hidden">
        <div class="topbar">
            <div>AlphaBot</div>
            <button class="btn btn-sm" onclick="doLogout()">Sign out</button>
        </div>
        <nav class="nav">
            <button class="nav-tab active" onclick="goTab('portfolio')">💼 Portfolio</button>
            <button class="nav-tab" onclick="goTab('bots')">🤖 Bots</button>
            <button class="nav-tab" onclick="goTab('account')">👤 Account</button>
        </nav>

        <div id="page-portfolio" class="page">
            <div class="card">
                <div style="font-size:10px;color:var(--t2)">Total balance</div>
                <div style="font-size:24px;font-weight:500" id="pf-bal">$0.00</div>
            </div>
        </div>
        
        <!-- Other pages (bots, markets, etc.) go here -->
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
