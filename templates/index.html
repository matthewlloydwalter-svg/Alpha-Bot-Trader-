<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlphaBot Trading</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg0: #0d0f14; --bg1: #13161e; --bg2: #1a1e28; --bg3: #222736;
            --border: #2a2f3d; --border2: #3a4055;
            --t1: #e8eaf0; --t2: #8b91a8; --t3: #555d78;
            --blue: #4d9fff; --green: #00d68f; --red: #ff4d6a;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg0); color: var(--t1); font-size: 13px; }
        .hidden { display: none !important; }
        .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 9px; padding: 14px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--t1); cursor: pointer; font-size: 12px; }
        .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
        input { background: var(--bg2); border: 1px solid var(--border); color: var(--t1); padding: 8px; border-radius: 6px; width: 100%; margin-bottom: 8px; }
        .nav { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0 10px; }
        .nav-tab { padding: 12px; cursor: pointer; color: var(--t2); border: none; background: none; }
        .nav-tab.active { color: var(--t1); border-bottom: 2px solid var(--blue); }
        .page { padding: 14px; }
        .topbar { display: flex; justify-content: space-between; padding: 10px 14px; background: var(--bg1); border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-screen">
        <div class="card" style="margin: 40px auto; max-width: 320px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 40px;">📈</div>
                <h2 style="margin-top: 5px;">AlphaBot Trading</h2>
            </div>
            
            <div style="display: flex; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;">
                <button class="btn" id="tab-login" onclick="showAuthTab('login')" style="flex: 1; border: none; background: var(--bg3);">Sign in</button>
                <button class="btn" id="tab-signup" onclick="showAuthTab('signup')" style="flex: 1; border: none; border-left: 1px solid var(--border);">Sign up</button>
            </div>
            
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" style="width: 100%;" onclick="doLogin()">Sign in</button>
            </div>

            <div id="signup-form" class="hidden">
                <input type="text" id="su-name" placeholder="Name">
                <input type="email" id="su-email" placeholder="Email">
                <input type="password" id="su-pass" placeholder="Password">
                <input type="password" id="su-pass-confirm" placeholder="Confirm Password">
                <div id="password-error" style="color: var(--red); font-size: 12px; margin-bottom: 8px;"></div>
                <button class="btn btn-primary" style="width: 100%;" onclick="doSignup()">Create account</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <span>AlphaBot</span>
            <button class="btn" onclick="doLogout()">Sign out</button>
        </div>
        <nav class="nav">
            <button class="nav-tab active" onclick="goTab('portfolio')">💼 Portfolio</button>
            <button class="nav-tab" onclick="goTab('bots')">🤖 Bots</button>
            <button class="nav-tab" onclick="goTab('account')">👤 Account</button>
        </nav>
        <div id="page-portfolio" class="page">
            <div class="card">Total Balance: $0.00</div>
        </div>
    </div>
</div>

<script>
    function showAuthTab(tab) {
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
        document.getElementById('tab-login').style.background = (tab === 'login') ? 'var(--bg3)' : 'transparent';
        document.getElementById('tab-signup').style.background = (tab === 'signup') ? 'var(--bg3)' : 'transparent';
    }
    
    function goTab(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + page).classList.remove('hidden');
    }
</script>
<script src="/static/js/app.js"></script>
</body>
</html>        <div class="topbar">
            <span>AlphaBot</span>
            <button class="btn" onclick="doLogout()">Sign out</button>

            <button class="nav-tab active" onclick="goTab('portfolio')">💼 Portfolio</button>
            <button class="nav-tab" onclick="goTab('bots')">🤖 Bots</button>
            <button class="nav-tab" onclick="goTab('account')">👤 Account</button>
        </nav>

        <div id="page-portfolio" class="page">
            <div class="card" style="margin-bottom: 15px;">
                <div style="color: var(--t2); font-size: 11px; text-transform: uppercase;">Total balance</div>
                <div style="font-size: 28px; font-weight: 500;" id="pf-bal">$0.00</div>
                <div style="font-size: 12px; color: var(--t2); margin-top: 5px;" id="pf-free">Cash: $0.00</div>
            </div>
            <div class="card">
                <div style="color: var(--t2); font-size: 11px; text-transform: uppercase; margin-bottom: 10px;">Holdings</div>
                <div id="pf-holdings"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function showAuthTab(tab) {
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
        document.getElementById('tab-login').style.background = (tab === 'login') ? 'var(--bg3)' : 'transparent';
        document.getElementById('tab-signup').style.background = (tab === 'signup') ? 'var(--bg3)' : 'transparent';
    }
    
    function goTab(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + page).classList.remove('hidden');
    }
</script>
<script src="/static/js/app.js"></script>
</body>
</html>
