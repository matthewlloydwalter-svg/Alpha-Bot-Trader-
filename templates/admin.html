<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ PLATFORM_NAME }} — Admin</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="toast-container" class="toast-wrap"></div>

  <div class="topbar">
    <div class="topbar-left">
      <img src="/static/alphabot-trading-logo.png" alt="{{ PLATFORM_NAME }} logo" class="brand-logo">
      <span class="logo-text">{{ PLATFORM_NAME }} Controls</span>
      <span class="badge badge-purple">Admin Mode</span>
    </div>
    <div>
      <button class="btn btn-sm btn-ghost" onclick="window.location.href='/'">Return to Dashboard</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-tab" onclick="window.location.href='/'">💼 Portfolio</button>
    <button class="nav-tab" onclick="window.location.href='/'">🤖 Bots</button>
    <button class="nav-tab" onclick="window.location.href='/'">👤 Account</button>
    <button class="nav-tab active">🛡️ Admin</button>
  </nav>

  <main class="page">
    <div class="card">
      <div class="slbl">System Metrics Summary</div>
      <div id="stats-content">
        <p style="color:var(--t2)">Querying secure system state telemetry...</p>
      </div>
    </div>
   
    <div class="card">
      <div class="slbl">Registered User Ledger</div>
      <div id="users-list">
        <p style="color:var(--t2)">Querying database records...</p>
      </div>
    </div>
  </main>

  <script src="/static/admin.js"></script>
</body>
</html>
